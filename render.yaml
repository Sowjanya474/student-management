services:
  - type: web
    name: student-management
    runtime: docker
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/*.jar"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-db
          property: connectionString
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: student-db
          property: connectionString

databases:
  - name: student-db
    plan: free
    databaseName: student_db