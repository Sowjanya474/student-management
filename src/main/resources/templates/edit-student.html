<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Student</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            color: #667eea;
            margin-bottom: 25px;
            font-size: 1.8em;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.9em;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            flex: 1;
            transition: transform 0.2s;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #555;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            flex: 1;
            text-decoration: none;
            text-align: center;
            transition: background 0.2s;
        }

        .btn-save:hover { transform: translateY(-2px); }
        .btn-cancel:hover { background: #e0e0e0; }
		
		.error-input { border-color: #ff6b6b !important; background: #fff5f5; }
		.error-msg { color: #ff6b6b; font-size: 0.8em; margin-top: 4px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✏️ Edit Student</h1>

		<form th:action="@{/students/update/{id}(id=${student.id})}"
		      th:object="${student}"
		      method="post">

		    <div class="form-group">
		        <label>Full Name</label>
		        <input type="text" th:field="*{name}"
		               th:classappend="${#fields.hasErrors('name')} ? 'error-input'"/>
		        <small class="error-msg"
		               th:if="${#fields.hasErrors('name')}"
		               th:errors="*{name}"></small>
		    </div>

		    <div class="form-group">
		        <label>Email Address</label>
		        <input type="email" th:field="*{email}"
		               th:classappend="${#fields.hasErrors('email')} ? 'error-input'"/>
		        <small class="error-msg"
		               th:if="${#fields.hasErrors('email')}"
		               th:errors="*{email}"></small>
		    </div>

		    <div class="form-group">
		        <label>Age</label>
		        <input type="number" th:field="*{age}"
		               th:classappend="${#fields.hasErrors('age')} ? 'error-input'"/>
		        <small class="error-msg"
		               th:if="${#fields.hasErrors('age')}"
		               th:errors="*{age}"></small>
		    </div>

		    <div class="form-group">
		        <label>Phone Number</label>
		        <input type="tel" th:field="*{phone}"
		               th:classappend="${#fields.hasErrors('phone')} ? 'error-input'"/>
		        <small class="error-msg"
		               th:if="${#fields.hasErrors('phone')}"
		               th:errors="*{phone}"></small>
		    </div>

		    <div class="btn-row">
		        <button type="submit" class="btn-save">💾 Save Changes</button>
		        <a href="/students" class="btn-cancel">✖ Cancel</a>
		    </div>
		</form>

        </form>
    </div>
</body>
</html>
